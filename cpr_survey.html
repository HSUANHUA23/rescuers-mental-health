<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>心理健康調查｜急救旁觀者研究</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --bg2: #eee9e0;
    --card: #fffcf8;
    --text: #2c2520;
    --text-muted: #7a6f65;
    --accent: #8b7355;
    --accent-light: #c4aa87;
    --accent-soft: #f0e8da;
    --green: #6b8f71;
    --green-soft: #e6efe7;
    --progress-fill: #8b7355;
    --border: #ddd5c5;
    --shadow: 0 4px 24px rgba(44,37,32,0.08);
    --radius: 16px;
    --btn-radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* ── BREATHING BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(196,170,135,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(107,143,113,0.10) 0%, transparent 60%);
    pointer-events: none;
    animation: breathe 8s ease-in-out infinite alternate;
  }
  @keyframes breathe {
    from { opacity: 0.6; }
    to   { opacity: 1; }
  }

  /* ── LAYOUT ── */
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 80px;
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--bg2);
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-light), var(--accent));
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
    border-radius: 0 2px 2px 0;
  }
  #progress-label {
    position: fixed;
    top: 10px; right: 16px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    z-index: 100;
    font-family: 'Noto Sans TC', sans-serif;
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 560px;
    padding: 36px 28px;
    margin-top: 32px;
  }

  /* ── SECTION LABEL ── */
  .section-chip {
    display: inline-block;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
    font-weight: 500;
  }

  /* ── QUESTION TEXT ── */
  .q-number {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .q-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 400;
    line-height: 1.65;
    color: var(--text);
    margin-bottom: 24px;
  }
  .q-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: -16px;
    margin-bottom: 20px;
    line-height: 1.6;
  }

  /* ── LIKERT SCALE (horizontal buttons) ── */
  .scale-wrap {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    padding: 0 2px;
  }
  .scale-buttons {
    display: flex;
    gap: 8px;
  }
  .scale-btn {
    flex: 1;
    aspect-ratio: 1;
    max-width: 60px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .scale-btn:active, .scale-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: scale(1.05);
  }

  /* ── SINGLE/MULTI CHOICE ── */
  .choice-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice-btn {
    width: 100%;
    text-align: left;
    padding: 14px 18px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: var(--btn-radius);
    cursor: pointer;
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    transition: all 0.2s;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .choice-btn .choice-key {
    min-width: 24px;
    height: 24px;
    border-radius: 6px;
    background: var(--bg2);
    color: var(--text-muted);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.2s;
  }
  .choice-btn:active, .choice-btn.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
    color: var(--text);
  }
  .choice-btn.selected .choice-key {
    background: var(--accent);
    color: #fff;
  }

  /* ── TEXT INPUT ── */
  .text-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--btn-radius);
    background: var(--card);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }
  .text-input:focus {
    border-color: var(--accent);
  }
  input.text-input {
    min-height: unset;
    height: 52px;
    resize: none;
  }

  /* ── RATING (1-10) ── */
  .rating-wrap {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .rating-btn {
    width: 44px;
    height: 44px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .rating-btn.selected, .rating-btn:active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .rating-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 8px;
  }

  /* ── NAVIGATION ── */
  .nav-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
    align-items: center;
  }
  .btn-next {
    flex: 1;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--btn-radius);
    font-size: 16px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-next:hover { background: #7a6348; }
  .btn-next:active { transform: scale(0.98); }
  .btn-next:disabled {
    background: var(--border);
    color: var(--text-muted);
    cursor: not-allowed;
  }
  .btn-back {
    width: 48px; height: 52px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--btn-radius);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-back:hover { background: var(--accent-soft); }

  /* ── TRANSITION / SECTION BREAK ── */
  .section-break {
    background: linear-gradient(135deg, var(--green-soft) 0%, var(--accent-soft) 100%);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    max-width: 560px;
    width: 100%;
    margin-top: 32px;
  }
  .section-break .sb-icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
  }
  .section-break h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 12px;
    color: var(--text);
  }
  .section-break p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.75;
    margin-bottom: 24px;
  }
  .btn-continue {
    padding: 14px 36px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--btn-radius);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn-continue:hover { background: #5a7a60; }

  /* ── WELCOME SCREEN ── */
  #welcome {
    max-width: 560px;
    width: 100%;
    margin-top: 40px;
    text-align: center;
  }
  #welcome .logo-mark {
    width: 64px; height: 64px;
    background: var(--accent-soft);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 24px;
    border: 1px solid var(--border);
  }
  #welcome h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--text);
  }
  #welcome p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.85;
    margin-bottom: 32px;
  }
  .id-field-wrap {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .id-field-wrap input {
    flex: 1;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--btn-radius);
    background: var(--card);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .id-field-wrap input:focus { border-color: var(--accent); }
  .btn-start {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--btn-radius);
    font-size: 17px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .btn-start:hover { background: #7a6348; }
  .resume-note {
    margin-top: 12px;
    font-size: 12px;
    color: var(--green);
    display: none;
  }

  /* ── COMPLETE SCREEN ── */
  #complete {
    max-width: 560px;
    width: 100%;
    margin-top: 40px;
    text-align: center;
  }
  #complete .done-icon {
    font-size: 56px;
    margin-bottom: 24px;
    display: block;
    animation: pop 0.5s cubic-bezier(.4,0,.2,1);
  }
  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  #complete h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 24px;
    font-weight: 400;
    margin-bottom: 16px;
  }
  #complete p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.85;
    margin-bottom: 32px;
  }
  .btn-export {
    padding: 14px 32px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--btn-radius);
    font-size: 15px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin: 6px;
  }
  .btn-export:hover { background: #5a7a60; }

  /* ── SKIP LINK ── */
  .skip-link {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 12px;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .skip-link:hover { color: var(--accent); }

  /* ── SLIDE ANIMATION ── */
  .slide-in {
    animation: slideIn 0.45s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .slide-out {
    animation: slideOut 0.3s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes slideOut {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-20px); }
  }

  /* ── SAVE INDICATOR ── */
  #save-dot {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--green-soft);
    border: 1px solid var(--green);
    color: var(--green);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 100px;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    z-index: 200;
  }
  #save-dot.show { opacity: 1; }

  /* ── MULTI-CHOICE HINT ── */
  .multi-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .multi-hint::before {
    content: '';
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--accent-light);
    flex-shrink: 0;
  }

  /* ── REQUIRED MARK ── */
  .req { color: #c0533a; font-size: 13px; margin-left: 2px; }

  @media (max-width: 400px) {
    .q-text { font-size: 16px; }
    .scale-btn { font-size: 13px; }
    .choice-btn { font-size: 14px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div id="progress-wrap"><div id="progress-bar" style="width:0%"></div></div>
<div id="progress-label">0%</div>
<div id="save-dot">✓ 已自動儲存</div>

<div id="app">
  <!-- Screens inserted by JS -->
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   DATA STRUCTURE
   Each item is one of:
     { type:'scale5', q, label, section?, sectionMsg? }
     { type:'scale4', q, label, section?, sectionMsg? }
     { type:'single', q, opts[], section?, sectionMsg? }
     { type:'multi',  q, opts[], section?, sectionMsg? }
     { type:'text',   q, placeholder?, multiline?, section?, sectionMsg? }
     { type:'number', q, unit?, section?, sectionMsg? }
     { type:'rating10', q, section?, sectionMsg? }
     { type:'break',  title, msg, icon }   ← section transition card
═══════════════════════════════════════════════════════════ */

const STORAGE_KEY = 'cpr_survey_v3';

const ITEMS = [
  // ── SECTION 1 ────────────────────────────────────────────
  { type:'break', icon:'🤝', title:'第一部分', msg:'這裡有一些特徵形容可能適合用來描述你。\n請針對每一題，勾選您同意的程度。\n\n「我認為我是一個⋯」' },

  { type:'scale5', q:'1. 樂於助人且無私的', label:'【性格特質】',

  { type:'scale5', q:'8. 有創造力的', scaleL:'非常不精確', scaleR:'非常精確' },

  { type:'break', icon:'💪', title:'第二部分', msg:'以下敘述主要是希望了解您本身的自我效能。\n請閱讀每一項目，並根據您對自己的了解，選擇最能夠符合您狀況的答案。' },

  // ── SECTION 3 ────────────────────────────────────────────
  { type:'break', icon:'🌿', title:'第三部分', msg:'請回想最近一個月來，發生下列各狀況的頻率。\n\n感謝您的誠實作答。' },

// Total question count (excluding breaks)
const TOTAL_Q = ITEMS.filter(i => i.type !== 'break').length;

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let state = {
  pid: '',
  date: '',
  cursor: 0,  // index into ITEMS
  answers: {}, // key = item index, value = answer
  startedAt: null,
};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
      return true;
    }
  } catch(e) {}
  return false;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    flashSave();
  } catch(e) {}
}

function flashSave() {
  const dot = document.getElementById('save-dot');
  dot.classList.add('show');
  clearTimeout(window._saveTimer);
  window._saveTimer = setTimeout(() => dot.classList.remove('show'), 1800);
}

/* ═══════════════════════════════════════════════
   PROGRESS
═══════════════════════════════════════════════ */
function answeredCount() {
  return Object.keys(state.answers).filter(k => {
    const item = ITEMS[parseInt(k)];
    return item && item.type !== 'break';
  }).length;
}

function updateProgress() {
  const pct = Math.round((answeredCount() / TOTAL_Q) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = pct + '%';
}

/* ═══════════════════════════════════════════════
   RENDER ENGINE
═══════════════════════════════════════════════ */
const app = document.getElementById('app');

function render() {
  updateProgress();
  if (state.cursor === -1) { renderWelcome(); return; }
  if (state.cursor >= ITEMS.length) { renderComplete(); return; }

  const item = ITEMS[state.cursor];
  if (item.type === 'break') {
    renderBreak(item);
  } else {
    renderQuestion(item, state.cursor);
  }
}

/* ── WELCOME ── */
function renderWelcome() {
  const hasProgress = answeredCount() > 0;
  app.innerHTML = `
    <div id="welcome" class="slide-in">
      <div class="logo-mark">🫀</div>
      <h1>心肺復甦術之旁觀施救者<br>心理健康調查</h1>
      <p>感謝您參與本研究。<br>
      本調查將詢問您於經歷急救事件後的心理健康狀態。<br>
      <br>
      問卷採一題一題方式呈現，您可以按照自己的步調填答。<br>
      每次作答均會自動儲存，若中途關閉可隨時繼續。</p>
      <div class="id-field-wrap">
        <input type="text" id="pid-input" placeholder="受試者 ID（選填）" value="${state.pid || ''}">
      </div>
      ${hasProgress ? `<p class="resume-note" style="display:block;margin-bottom:16px;">✓ 偵測到上次進度（已完成 ${answeredCount()} 題），點擊下方繼續</p>` : ''}
      <button class="btn-start" onclick="startSurvey()">${hasProgress ? '繼續填寫' : '開始填寫'}</button>
      ${hasProgress ? `<p class="skip-link" onclick="resetSurvey()">重新開始</p>` : ''}
    </div>`;
}

function startSurvey() {
  state.pid = document.getElementById('pid-input').value.trim();
  state.startedAt = state.startedAt || new Date().toISOString();
  if (state.cursor === -1) state.cursor = 0;
  saveState();
  render();
}

function resetSurvey() {
  if (confirm('確定要清除所有進度，重新開始？')) {
    localStorage.removeItem(STORAGE_KEY);
    state = { pid:'', date:'', cursor:0, answers:{}, startedAt:null };
    render();
  }
}

/* ── SECTION BREAK ── */
function renderBreak(item) {
  app.innerHTML = `
    <div class="section-break slide-in">
      <span class="sb-icon">${item.icon}</span>
      <h2>${item.title}</h2>
      <p>${item.msg.replace(/\n/g,'<br>')}</p>
      <button class="btn-continue" onclick="advance()">繼續 →</button>
    </div>`;
}

/* ── QUESTION ── */
function renderQuestion(item, idx) {
  // Question counter (only count non-break items up to cursor)
  const qNum = ITEMS.slice(0, idx+1).filter(i => i.type !== 'break').length;

  let inner = '';
  const saved = state.answers[idx];

  if (item.label) {
    inner += `<div class="section-chip">${item.label}</div>`;
  }
  inner += `<div class="q-number">問題 ${qNum} / ${TOTAL_Q}</div>`;
  inner += `<div class="q-text">${item.q}${item.optional ? '' : '<span class="req">＊</span>'}</div>`;
  if (item.sub) inner += `<div class="q-sub">${item.sub}</div>`;

  if (item.type === 'scale5') {
    inner += renderScale(5, idx, item, saved);
  } else if (item.type === 'scale4') {
    inner += renderScale(4, idx, item, saved);
  } else if (item.type === 'single') {
    inner += renderSingle(idx, item, saved);
  } else if (item.type === 'multi') {
    inner += `<div class="multi-hint">可複選多個選項</div>`;
    inner += renderMulti(idx, item, saved);
  } else if (item.type === 'text') {
    inner += renderText(idx, item, saved);
  } else if (item.type === 'number') {
    inner += renderNumber(idx, item, saved);
  } else if (item.type === 'rating10') {
    inner += renderRating10(idx, item, saved);
  }

  // Navigation
  const canNext = item.optional ? true : !!saved && (Array.isArray(saved) ? saved.length > 0 : saved !== '');
  inner += `<div class="nav-row">
    ${state.cursor > 0 ? `<button class="btn-back" onclick="goBack()">←</button>` : ''}
    <button class="btn-next" id="btn-next" onclick="advance()" ${canNext ? '' : 'disabled'}>
      ${state.cursor === ITEMS.length - 1 ? '完成提交 ✓' : '下一題 →'}
    </button>
  </div>`;

  if (item.optional) {
    inner += `<p class="skip-link" onclick="skipQ(${idx})">略過此題</p>`;
  }

  app.innerHTML = `<div class="card slide-in">${inner}</div>`;

  // Auto-focus text inputs
  const ta = app.querySelector('textarea, input[type=text], input[type=number]');
  if (ta) setTimeout(() => ta.focus(), 300);
}

function renderScale(n, idx, item, saved) {
  let html = `<div class="scale-wrap"><div class="scale-labels"><span>${item.scaleL}</span><span>${item.scaleR}</span></div><div class="scale-buttons">`;
  for (let v = 1; v <= n; v++) {
    const sel = saved == v ? 'selected' : '';
    html += `<button class="scale-btn ${sel}" onclick="pickScale(${idx},${v},${n})">${v}</button>`;
  }
  html += '</div></div>';
  return html;
}

function pickScale(idx, val, n) {
  state.answers[idx] = val;
  saveState();
  // highlight
  app.querySelectorAll('.scale-btn').forEach((b,i) => b.classList.toggle('selected', i+1 === val));
  document.getElementById('btn-next').disabled = false;
  setTimeout(() => advance(), 400);
}

function renderSingle(idx, item, saved) {
  let html = '<div class="choice-list">';
  item.opts.forEach((opt, i) => {
    const sel = saved === opt ? 'selected' : '';
    html += `<button class="choice-btn ${sel}" onclick="pickSingle(${idx},'${encodeURIComponent(opt)}')">
      <span class="choice-key">${i+1}</span><span>${opt}</span>
    </button>`;
  });
  html += '</div>';
  return html;
}

function pickSingle(idx, encVal) {
  const val = decodeURIComponent(encVal);
  state.answers[idx] = val;
  saveState();
  app.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.toggle('selected', b.querySelector('span:last-child').textContent === val);
  });
  document.getElementById('btn-next').disabled = false;
  setTimeout(() => advance(), 400);
}

function renderMulti(idx, item, saved) {
  const savedArr = saved || [];
  let html = '<div class="choice-list">';
  item.opts.forEach((opt, i) => {
    const sel = savedArr.includes(opt) ? 'selected' : '';
    html += `<button class="choice-btn ${sel}" onclick="toggleMulti(${idx},'${encodeURIComponent(opt)}')">
      <span class="choice-key">${i+1}</span><span>${opt}</span>
    </button>`;
  });
  html += '</div>';
  return html;
}

function toggleMulti(idx, encVal) {
  const val = decodeURIComponent(encVal);
  let arr = state.answers[idx] || [];
  if (arr.includes(val)) arr = arr.filter(v => v !== val);
  else arr = [...arr, val];
  state.answers[idx] = arr;
  saveState();
  renderQuestion(ITEMS[idx], idx);
  updateProgress();
}

function renderText(idx, item, saved) {
  if (item.multiline) {
    return `<textarea class="text-input" placeholder="${item.placeholder||''}" 
      oninput="saveText(${idx},this.value)" rows="4">${saved||''}</textarea>`;
  }
  return `<input class="text-input" type="text" placeholder="${item.placeholder||''}" 
    value="${saved||''}" oninput="saveText(${idx},this.value)">`;
}

function saveText(idx, val) {
  state.answers[idx] = val;
  saveState();
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = !val && !ITEMS[idx].optional;
}

function renderNumber(idx, item, saved) {
  return `<div style="display:flex;align-items:center;gap:12px;">
    <input class="text-input" type="number" min="0" style="max-width:120px;height:52px;" 
      value="${saved||''}" oninput="saveText(${idx},this.value)" placeholder="0">
    <span style="color:var(--text-muted);font-size:14px;">${item.unit||''}</span>
  </div>`;
}

function renderRating10(idx, item, saved) {
  let html = '<div class="rating-wrap">';
  for (let v = 1; v <= 10; v++) {
    const sel = saved == v ? 'selected' : '';
    html += `<button class="rating-btn ${sel}" onclick="pickRating(${idx},${v})">${v}</button>`;
  }
  html += `</div><div class="rating-labels"><span>非常不滿意</span><span>非常滿意</span></div>`;
  return html;
}

function pickRating(idx, val) {
  state.answers[idx] = val;
  saveState();
  app.querySelectorAll('.rating-btn').forEach((b,i) => b.classList.toggle('selected', i+1 === val));
  document.getElementById('btn-next').disabled = false;
  setTimeout(() => advance(), 400);
}

/* ── NAVIGATION ── */
function advance() {
  const item = ITEMS[state.cursor];
  // Special skip: Q97 选否 → jump to complete
  if (item && item.type === 'single') {
    const ans = state.answers[state.cursor];
    if (ans && ans.includes('否') && state.cursor === ITEMS.findIndex(i => i.q && i.q.startsWith('97.'))) {
      state.cursor = ITEMS.length;
      saveState();
      render();
      return;
    }
  }
  state.cursor++;
  saveState();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (state.cursor > 0) {
    state.cursor--;
    saveState();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function skipQ(idx) {
  state.answers[idx] = '__skipped__';
  advance();
}

/* ── COMPLETE ── */
function renderComplete() {
  app.innerHTML = `
    <div id="complete" class="slide-in">
      <span class="done-icon">🌸</span>
      <h1>感謝您的寶貴分享</h1>
      <p>您已完成所有問卷題目。<br><br>
      您今天的勇氣與付出，不僅在急救現場，<br>
      也在這份研究中留下了珍貴的足跡。<br><br>
      如有任何疑問，請洽研究人員。</p>
      <div>
        <button class="btn-export" onclick="exportJSON()">📥 下載 JSON 資料</button>
        <button class="btn-export" onclick="exportCSV()">📥 下載 CSV 資料</button>
      </div>
    </div>`;
  updateProgress();
}

/* ── EXPORT ── */
function exportJSON() {
  const out = {
    id: state.pid,
    startedAt: state.startedAt,
    completedAt: new Date().toISOString(),
    answers: {}
  };
  ITEMS.forEach((item, idx) => {
    if (item.type === 'break') return;
    const qNum = ITEMS.slice(0, idx+1).filter(i => i.type !== 'break').length;
    const key = `Q${qNum}`;
    out.answers[key] = { question: item.q, answer: state.answers[idx] ?? null };
  });
  download('cpr_survey_result.json', JSON.stringify(out, null, 2), 'application/json');
}

function exportCSV() {
  let rows = [['問題編號','問題','答案']];
  ITEMS.forEach((item, idx) => {
    if (item.type === 'break') return;
    const qNum = ITEMS.slice(0, idx+1).filter(i => i.type !== 'break').length;
    const ans = state.answers[idx];
    rows.push([`Q${qNum}`, `"${item.q.replace(/"/g,'""')}"`, `"${Array.isArray(ans)?ans.join('；'):(ans??'')}"` ]);
  });
  download('cpr_survey_result.csv', '\uFEFF' + rows.map(r=>r.join(',')).join('\n'), 'text/csv');
}

function download(name, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type: mime}));
  a.download = name;
  a.click();
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
const hadProgress = loadState();
if (state.cursor === undefined || state.cursor === null) state.cursor = -1;
// If never started, show welcome
if (!hadProgress || !state.startedAt) state.cursor = -1;
render();
</script>
